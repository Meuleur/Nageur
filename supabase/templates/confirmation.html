<!doctype html>
<html lang="fr">
  <body style="margin: 0; padding: 24px; background-color: #f7f9fb; font-family: Arial, Helvetica, sans-serif; color: #0f172a">
    <div style="max-width: 480px; margin: 0 auto; background-color: #ffffff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 32px">
      <h1 style="margin: 0 0 16px; font-size: 20px">Confirmez votre adresse e-mail</h1>
      <p style="margin: 0 0 16px; font-size: 15px; line-height: 1.5">
        Bienvenue sur App Natation. Pour activer votre compte, confirmez votre adresse e-mail en
        cliquant sur le bouton ci-dessous. Ce lien est valable 24&nbsp;heures.
      </p>
      <p style="margin: 0 0 24px">
        <a
          href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=signup"
          style="display: inline-block; background-color: #0ea5e9; color: #ffffff; text-decoration: none; font-size: 15px; padding: 12px 20px; border-radius: 12px"
          >Confirmer mon adresse</a
        >
      </p>
      <p style="margin: 0; font-size: 13px; color: #64748b">
        Si vous n'êtes pas à l'origine de cette inscription, ignorez simplement cet e-mail.
      </p>
    </div>
  </body>
</html>
